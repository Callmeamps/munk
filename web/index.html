<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Munk Dashboard</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; border-right: 1px solid #ccc; padding: 10px; overflow-y: auto; }
        #content { flex-grow: 1; padding: 20px; display: flex; flex-direction: column; }
        .chunk-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .chunk-item:hover { background: #f0f0f0; }
        pre { background: #f4f4f4; padding: 15px; flex-grow: 1; overflow: auto; }
        .controls { margin-top: 10px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Manifest ID</h3>
        <input type="text" id="manifestId" placeholder="man_...">
        <button onclick="loadManifest()">Load</button>
        <div id="chunkList"></div>
    </div>
    <div id="content">
        <h2 id="chunkTitle">Select a chunk</h2>
        <pre id="chunkContent"></pre>
        <div class="controls">
            <button onclick="exportManifest()">Export Rebuild</button>
        </div>
    </div>

    <script>
        async function loadManifest() {
            const id = document.getElementById('manifestId').value;
            const res = await fetch(`/manifests/${id}`);
            const manifest = await res.json();
            const list = document.getElementById('chunkList');
            list.innerHTML = '';
            manifest.order.forEach(cid => {
                const div = document.createElement('div');
                div.className = 'chunk-item';
                div.innerText = cid;
                div.onclick = () => loadChunk(cid);
                list.appendChild(div);
            });
        }

        async function loadChunk(id) {
            const res = await fetch(`/chunks/${id}`);
            const chunk = await res.json();
            document.getElementById('chunkTitle').innerText = chunk.title || id;
            document.getElementById('chunkContent').innerText = chunk.content;
        }

        async function exportManifest() {
            const id = document.getElementById('manifestId').value;
            const res = await fetch(`/manifests/${id}/export`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ output_filename: 'web_export.txt' })
            });
            const data = await res.json();
            alert('Exported to: ' + data.output_path);
        }
    </script>
</body>
</html>
